# GoFast Configuration
# MySQL Slow Log Parser Configuration

# DuckDB database settings
duckdb:
  # Path to the DuckDB database file
  path: "../perf_test.duckdb"

# Parser settings
parser:
  # Directory containing MySQL slow log files
  slow_log_dir: "./logs"
  
  # Batch size for inserting records (default: 1000)
  batch_size: 1000

  file_patterns:
    - "*slow*"
    - "*.log"
    - "*mysql*"
  workers: 2

# API server settings
api:
  # Host to bind the API server
  host: "0.0.0.0"
  
  # Port to listen on
  port: 8080
