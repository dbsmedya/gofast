name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build ./...
      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...
      - name: Test with race (parser/storage concurrency)
        env:
          CGO_ENABLED: "1"
        # Phase 3 concurrency tests must run under the race detector.
        run: go test -race -timeout 120s ./pkg/parser/ ./pkg/storage/
      # SQLi regression probes (pkg/storage) and kin-openapi response
      # conformance (pkg/api) run as part of `go test ./...` above.

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        env:
          CGO_ENABLED: "1"
        with:
          version: v2.11.4
          args: ./...

  deadcode:
    name: deadcode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest
      - name: Reachability (fail on any unreachable func)
        env:
          CGO_ENABLED: "1"
        # -test includes test files as roots, so exported library/test helpers
        # consumed only by tests count as reachable. Any output = dead code.
        run: |
          out="$(deadcode -test ./...)"
          if [ -n "$out" ]; then
            echo "Unreachable functions found:"
            echo "$out"
            exit 1
          fi
          echo "deadcode: all functions reachable"

  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install httpx
        run: python -m pip install httpx
      - name: Run machine-contract check
        env:
          CGO_ENABLED: "1"
        run: bash scripts/run-contract-check.sh

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Install gitleaks
        # gitleaks' go.mod still declares the pre-rename module path
        # (github.com/zricethezav/gitleaks/v8); only the GitHub repo redirected.
        # Installing via the new path fails go's module-path consistency check.
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan full history for secrets
        run: gitleaks detect --source . --redact --no-banner

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Install and run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"
      - name: Fuzz parser (short)
        env:
          CGO_ENABLED: "1"
        run: |
          go test -fuzz=FuzzTokenize -fuzztime=30s ./pkg/parser/
          go test -fuzz=FuzzExtractTables -fuzztime=30s ./pkg/parser/
          go test -fuzz=FuzzStripUseStatement -fuzztime=30s ./pkg/parser/
